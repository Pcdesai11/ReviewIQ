# ReviewIQ

**AI-powered code review & CI triage, with the polish of a private bank and the guts of a real engineering platform.**

ReviewIQ watches your pull requests and your CI pipeline, and tells you — calmly, specifically, and before your reviewers have to — what's actually risky. It flags dangerous diffs, predicts which tests are about to flake, and auto-triages CI failures so humans spend their time on judgment calls instead of log-scrolling.

> This project is a hands-on demonstration of "AI as a service to engineering teams": LLM-backed analysis wired into real API infrastructure, with the monitoring, design rigor, and documentation discipline you'd expect from a production developer tool.

