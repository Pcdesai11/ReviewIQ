## Why ReviewIQ

CI feedback today is loud and undiscriminating: every red X looks equally urgent, every diff gets the same scrutiny, and flaky tests erode trust in the whole pipeline. ReviewIQ applies an LLM where it's actually useful — pattern recognition over noisy, high-volume engineering signals — and stays out of the way otherwise.

Three jobs, done well:

1. **Risk-flag diffs** — surface the 10% of a PR that deserves a human's full attention (auth changes, migrations, concurrency, silent behavior changes) instead of treating every line equally.
2. **Predict test flakiness** — learn the signature of flaky tests (timing-sensitive assertions, shared mutable state, network calls) and flag them *before* they waste a re-run cycle.
3. **Auto-triage CI failures** — classify a failure (infra blip vs. real regression vs. flaky test vs. environment issue) and route it accordingly, with a one-paragraph explanation a human can act on in seconds.

## Core Capabilities

| Capability | What it does |
|---|---|
| **Diff Risk Scoring** | Every PR gets a risk score (0–100) and a short rationale, generated from the diff, file ownership history, and blast-radius analysis. |
| **Flakiness Prediction** | Statistical model + LLM heuristics over historical test run data to flag tests likely to flake, with a confidence score. |
| **CI Failure Triage** | Classifies failures into `infra`, `flaky`, `regression`, or `environment`, summarizes the root cause, and tags the responsible service/owner. |
| **Review Comments** | Posts inline PR comments (GitHub/Azure DevOps) with specific, actionable feedback — not generic LLM filler. |
| **Trend Dashboard** | Tracks risk-score drift, flake rates, and triage accuracy over time per repo/team. |
| **Audit Trail** | Every model decision is logged with the prompt, model version, and output — fully reproducible and reviewable. |

## Architecture

```
┌─────────────┐      ┌──────────────────┐      ┌─────────────────┐
│  Git Host   │─────▶│   Ingest Layer    │─────▶│  Event Queue    │
│ (GitHub/ADO)│ webhook │ (FastAPI)       │      │ (Redis/Kafka)   │
└─────────────┘      └──────────────────┘      └────────┬────────┘
                                                          │
                              ┌───────────────────────────┼───────────────────────────┐
                              ▼                           ▼                           ▼
                    ┌──────────────────┐       ┌──────────────────┐       ┌──────────────────┐
                    │  Diff Risk Worker │       │ Flakiness Worker  │       │  Triage Worker    │
                    │  (LLM + heuristics)│      │ (stats + LLM)     │       │ (LLM classifier)  │
                    └────────┬──────────┘       └────────┬──────────┘       └────────┬──────────┘
                              └───────────────────────────┼───────────────────────────┘
                                                          ▼
                                              ┌──────────────────────┐
                                              │   Results API         │
                                              │   (FastAPI + Postgres)│
                                              └──────────┬───────────┘
                                                          │
                              ┌───────────────────────────┼───────────────────────────┐
                              ▼                                                       ▼
                    ┌──────────────────┐                                   ┌──────────────────┐
                    │  PR Comment Bot   │                                   │   Dashboard (web) │
                    └──────────────────┘                                   └──────────────────┘
```

**Design intent behind the architecture:**

- **Webhook ingest is decoupled from analysis** via a queue, so a slow LLM call never blocks a CI status check or causes webhook retries/storms.
- **Each analysis type is its own worker**, independently scalable and independently swappable (e.g., the flakiness worker can run a cheap statistical model first and only escalate to an LLM call when the signal is ambiguous — keeps latency and cost down).
- **Everything writes to one Results API**, so the dashboard, PR bot, and any future Slack/Teams integration all read from a single source of truth instead of duplicating logic.

## Tech Stack

**Backend**
- **FastAPI** (Python) — async, typed, OpenAPI docs out of the box
- **PostgreSQL** — durable storage for runs, scores, and audit logs
- **Redis** (or Kafka for higher volume) — event queue between ingest and workers
- **SQLAlchemy + Alembic** — schema and migrations
- **LLM layer** — provider-agnostic interface (OpenAI API by default; pluggable for Azure OpenAI or open-source models via vLLM/Ollama for self-hosting)
- **Prometheus + Grafana** — metrics, latency, and cost-per-analysis dashboards
- **Structured logging** (JSON) shipped to your log sink of choice

**Frontend**
- **React + TypeScript**, **Vite**
- **Tailwind** with a custom design system (see [Design Language](#design-language))
- **Recharts** for trend visualizations
- **TanStack Query** for data fetching/caching against the Results API

**Infra**
- Docker Compose for local dev; Kubernetes manifests (or Azure Container Apps) for deployment
- GitHub Actions for CI/CD of ReviewIQ itself (it dogfoods its own triage bot)

## Design Language

The dashboard is deliberately **understated and confident** — old-money, not Silicon Valley neon. The goal: a tool senior engineers trust at a glance, the way they'd trust a well-bound ledger book over a flashing dashboard.

- **Palette**: cream/ivory backgrounds, deep navy and forest-green accents, brass/gold used sparingly for highlights (risk scores, key metrics) — no saturated alert-reds except for genuine high-risk flags.
- **Typography**: a serif display face (e.g., "Source Serif 4" or "Lora") for headings and numerals, paired with a clean grotesque (e.g., "Inter") for body and UI text — print-ledger meets modern legibility.
- **Texture & detail**: thin hairline rules instead of heavy borders, generous whitespace, subtle paper-grain or letterpress-style shadows on cards, monospace for diffs and code excerpts.
- **Motion**: minimal — fades and gentle easing only. Nothing animates just to prove it can.
- **Iconography**: line icons, not filled; no emoji in the product UI.

> Think: a private bank's client portal crossed with a well-typeset annual report — not a SaaS dashboard.

## Getting Started

```bash
git clone https://github.com/<you>/ReviewIQ.git
cd ReviewIQ

# Backend
cp .env.example .env        # add your LLM API key + webhook secret
docker compose up -d postgres redis
cd backend
pip install -r requirements.txt
alembic upgrade head
uvicorn app.main:app --reload

# Frontend
cd ../frontend
npm install
npm run dev
```

Then point a GitHub webhook (PR opened/synchronize + workflow_run events) at `POST /webhooks/github`.

## Configuration

All configuration is environment-driven (`.env`):

| Variable | Description |
|---|---|
| `LLM_PROVIDER` | `openai` \| `azure_openai` \| `local` |
| `LLM_MODEL` | Model name/deployment |
| `LLM_API_KEY` | Provider API key |
| `GITHUB_WEBHOOK_SECRET` | HMAC secret for verifying incoming webhooks |
| `DATABASE_URL` | Postgres connection string |
| `REDIS_URL` | Queue connection string |
| `RISK_THRESHOLD` | Score above which a PR gets a blocking comment vs. an informational one |

## API Reference

Full OpenAPI docs are auto-generated at `/docs` once the backend is running. Key endpoints:

| Endpoint | Method | Description |
|---|---|---|
| `/webhooks/github` | `POST` | Receives PR/CI events from GitHub |
| `/v1/pulls/{id}/risk` | `GET` | Returns the current risk score + rationale for a PR |
| `/v1/tests/flaky` | `GET` | Lists tests currently flagged as flake-risk, with confidence scores |
| `/v1/ci-runs/{id}/triage` | `GET` | Returns the classification + root-cause summary for a failed run |
| `/v1/metrics/summary` | `GET` | Aggregate stats for the dashboard (used by the frontend) |

## Monitoring & Reporting

- **Latency & cost dashboards** per analysis type (Prometheus/Grafana) — so you can see exactly what each LLM call costs and how long it takes under load.
- **Accuracy tracking**: triage classifications and flakiness predictions are scored against ground truth as it becomes available (e.g., a "flaky" prediction is validated the next time that test passes on retry with no code change), feeding a running precision/recall view.
- **Audit log**: every LLM decision — prompt, model version, response, and resulting action — is stored and queryable, so any flag can be explained and any model regression can be traced.

## Design Principles

These are the standards the codebase is held to, and the ones I'd bring to a team:

1. **Decouple ingestion from inference.** Webhooks should never wait on an LLM.
2. **Cheap-first, LLM-second.** Use heuristics/statistics to filter for ambiguous cases before paying for a model call.
3. **Every output is explainable.** No bare scores — every flag ships with a rationale a human can verify in seconds.
4. **Provider-agnostic by design.** Swapping OpenAI for Azure OpenAI or a self-hosted model should be a config change, not a rewrite.
5. **Dogfood relentlessly.** ReviewIQ reviews its own PRs and triages its own CI failures.

