# ReviewIQ on Render — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → Blueprints → New Blueprint Instance → connect this repo.

envVarGroups:
  - name: reviewiq-secrets
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false

services:
  - type: keyvalue
    name: reviewiq-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: reviewiq-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: reviewiq-secrets
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: RISK_THRESHOLD
        value: "70"
      - key: DATABASE_URL
        fromDatabase:
          name: reviewiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: reviewiq-redis
          property: connectionString

  - type: worker
    name: reviewiq-worker
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.workers.runner
    envVars:
      - fromGroup: reviewiq-secrets
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: RISK_THRESHOLD
        value: "70"
      - key: WORKER_POLL_INTERVAL
        value: "1.0"
      - key: DATABASE_URL
        fromDatabase:
          name: reviewiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: reviewiq-redis
          property: connectionString

databases:
  - name: reviewiq-db
    plan: starter
    databaseName: reviewiq
    user: reviewiq
